<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CEASA - Sem conexão</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #065f46 0%, #047857 60%, #059669 100%);
      color: #ecfdf5; padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
      background: rgba(0,0,0,0.28); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 20px; padding: 32px 24px;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,.5);
    }
    img { width: 96px; height: 96px; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,.35); }
    h1 { font-size: 20px; margin: 20px 0 8px; letter-spacing: .2px; }
    p { font-size: 14px; opacity: .85; margin: 0 0 20px; line-height: 1.5; }
    button {
      background: #ecfdf5; color: #065f46; border: 0; font-weight: 700;
      padding: 12px 22px; border-radius: 999px; cursor: pointer; font-size: 14px;
      box-shadow: 0 6px 14px rgba(0,0,0,.25);
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="CEASA">
    <h1>Sem conexão</h1>
    <p>Você está offline. Para garantir que nenhum pedido seja perdido ou sobrescreva o de outro comprador, os dados só são enviados quando houver internet.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
